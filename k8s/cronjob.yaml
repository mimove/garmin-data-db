apiVersion: batch/v1
kind: CronJob
metadata:
  name: garmin-sync
  namespace: garmin
spec:
  schedule: "15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: garmin-sync
              image: mimove/garmin-data-db:latest
              imagePullPolicy: Always
              envFrom:
                - secretRef:
                    name: garmin-sync-secrets
              env:
                - name: GARMINTOKENS
                  value: /tokens
                - name: BACKFILL_START
                  value: "2023-01-01"
                - name: MAX_DAYS_PER_RUN
                  value: "50"
                - name: THROTTLE_SECONDS
                  value: "1"
              volumeMounts:
                - name: tokens
                  mountPath: /tokens
          volumes:
            - name: tokens
              persistentVolumeClaim:
                claimName: garmin-tokens
