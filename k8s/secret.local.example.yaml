# Local k3s variant — Postgres reached via static compose-network IP.
# Copy to k8s/secret.local.yaml (gitignored), fill Garmin credentials, then:
#   kubectl apply -f k8s/secret.local.yaml
apiVersion: v1
kind: Secret
metadata:
  name: garmin-sync-secrets
  namespace: garmin
type: Opaque
stringData:
  GARMIN_EMAIL: "you@example.com"
  GARMIN_PASSWORD: "changeme"
  POSTGRES_HOST: "172.28.0.10"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "garmin"
  POSTGRES_USER: "garmin"
  POSTGRES_PASSWORD: "garmin"
